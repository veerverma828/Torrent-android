name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'App.jsx'
      - 'index.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Calculate build number
        id: build_number
        run: echo "build=$(( ${{ github.run_number }} + 100 ))" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Bundle React Native JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      # Release build signed with a persistent keystore (repo secrets below).
      # Same signature every build -> Android replaces the installed app in
      # place, no "package conflicts with an existing package" on install.
      - name: Decode keystore
        working-directory: android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK with run number
        working-directory: android
        run: |
          mkdir -p ../dist-apk
          cp app/build/outputs/apk/release/app-release.apk \
             ../dist-apk/torrent-${{ steps.build_number.outputs.build }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: torrent-apk
          path: dist-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: apk-${{ steps.build_number.outputs.build }}
          name: Torrent Debrid APK build ${{ steps.build_number.outputs.build }}
          files: dist-apk/*.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.

            Install: download the .apk below, transfer to your Android phone,
            and tap to install (allow "install from unknown sources" if
            prompted). Installed apps auto-detect this release and offer an
            in-app update.
